<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="1100" viewBox="0 0 1460 1100">
  <style>
    .title { font: 700 28px Arial, sans-serif; fill: #111827; }
    .label { font: 600 15px Arial, sans-serif; fill: #111827; }
    .small { font: 500 13px Arial, sans-serif; fill: #374151; }
    .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 12; }
    .blue { fill: #eff6ff; stroke: #1d4ed8; }
    .green { fill: #ecfdf5; stroke: #047857; }
    .orange { fill: #fff7ed; stroke: #c2410c; }
    .purple { fill: #faf5ff; stroke: #7e22ce; }
    .arrow { stroke: #475569; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="730" y="38" text-anchor="middle" class="title">Fluxo Detalhado com CLI</text>

  <rect x="60" y="70" width="300" height="70" class="box"/>
  <text x="210" y="102" text-anchor="middle" class="label">main.py ou python -m school_predictor</text>
  <text x="210" y="125" text-anchor="middle" class="small">entrada de operação</text>

  <rect x="420" y="60" width="220" height="80" class="box blue"/>
  <text x="530" y="95" text-anchor="middle" class="label">school_predictor.cli</text>
  <text x="530" y="120" text-anchor="middle" class="small">workflow, prepare-db, extract, pipeline, reports, compare-history, clean</text>

  <rect x="80" y="210" width="190" height="60" class="box"/>
  <text x="175" y="246" text-anchor="middle" class="label">workflow</text>

  <rect x="300" y="210" width="190" height="60" class="box"/>
  <text x="395" y="246" text-anchor="middle" class="label">prepare-db</text>

  <rect x="520" y="210" width="190" height="60" class="box"/>
  <text x="615" y="246" text-anchor="middle" class="label">extract</text>

  <rect x="740" y="210" width="190" height="60" class="box"/>
  <text x="835" y="246" text-anchor="middle" class="label">pipeline</text>

  <rect x="960" y="210" width="190" height="60" class="box"/>
  <text x="1055" y="246" text-anchor="middle" class="label">reports</text>

  <rect x="1180" y="210" width="190" height="60" class="box"/>
  <text x="1275" y="246" text-anchor="middle" class="label">compare-history</text>

  <rect x="1180" y="290" width="190" height="60" class="box"/>
  <text x="1275" y="326" text-anchor="middle" class="label">clean</text>

  <rect x="90" y="340" width="300" height="80" class="box green"/>
  <text x="240" y="375" text-anchor="middle" class="label">school_predictor.application</text>
  <text x="240" y="400" text-anchor="middle" class="small">orquestra os fluxos operacionais</text>

  <rect x="450" y="340" width="300" height="80" class="box green"/>
  <text x="600" y="375" text-anchor="middle" class="label">school_predictor.database</text>
  <text x="600" y="400" text-anchor="middle" class="small">access, maintenance, extraction, queries</text>

  <rect x="450" y="450" width="300" height="80" class="box"/>
  <text x="600" y="485" text-anchor="middle" class="label">consultas SQL privadas locais</text>
  <text x="600" y="510" text-anchor="middle" class="small">private_sql ou SCHOOL_PREDICTOR_SQL_DIR</text>

  <rect x="90" y="450" width="300" height="80" class="box"/>
  <text x="240" y="485" text-anchor="middle" class="label">private_runtime.py local</text>
  <text x="240" y="510" text-anchor="middle" class="small">prepare_private_database e extract_private_school_data</text>

  <rect x="810" y="340" width="300" height="80" class="box green"/>
  <text x="960" y="375" text-anchor="middle" class="label">school_predictor.pipeline</text>
  <text x="960" y="400" text-anchor="middle" class="small">config, data, dataset, modeling, reporting, history</text>

  <rect x="1170" y="500" width="220" height="80" class="box green"/>
  <text x="1280" y="535" text-anchor="middle" class="label">school_predictor.cleanup</text>
  <text x="1280" y="560" text-anchor="middle" class="small">latex, pycache, results</text>

  <rect x="460" y="570" width="280" height="70" class="box orange"/>
  <text x="600" y="610" text-anchor="middle" class="label">artifacts/database/csv</text>

  <rect x="810" y="500" width="300" height="80" class="box purple"/>
  <text x="960" y="535" text-anchor="middle" class="label">run_real_pipeline()</text>
  <text x="960" y="560" text-anchor="middle" class="small">previsao_nota ou alerta_risco</text>

  <rect x="810" y="640" width="300" height="80" class="box purple"/>
  <text x="960" y="675" text-anchor="middle" class="label">build_school_reports()</text>
  <text x="960" y="700" text-anchor="middle" class="small">relatórios escolares finais</text>

  <rect x="810" y="790" width="300" height="90" class="box orange"/>
  <text x="960" y="823" text-anchor="middle" class="label">artifacts/reports e artifacts/pipeline</text>
  <text x="960" y="847" text-anchor="middle" class="small">saídas canônicas da aplicação</text>
  <text x="960" y="867" text-anchor="middle" class="small">para modelagem e relatórios</text>

  <rect x="1170" y="640" width="220" height="80" class="box blue"/>
  <text x="1280" y="675" text-anchor="middle" class="label">dashboard_streamlit.py</text>
  <text x="1280" y="700" text-anchor="middle" class="small">school_predictor.app.dashboard</text>

  <path d="M 360 105 L 420 100" class="arrow"/>
  <path d="M 520 140 L 175 210" class="arrow"/>
  <path d="M 530 140 L 395 210" class="arrow"/>
  <path d="M 540 140 L 615 210" class="arrow"/>
  <path d="M 560 140 L 835 210" class="arrow"/>
  <path d="M 575 140 L 1055 210" class="arrow"/>
  <path d="M 590 140 L 1275 210" class="arrow"/>
  <path d="M 605 140 L 1275 290" class="arrow"/>

  <path d="M 175 270 L 175 340" class="arrow"/>
  <path d="M 395 270 L 540 340" class="arrow"/>
  <path d="M 615 270 L 600 340" class="arrow"/>
  <path d="M 835 270 L 960 340" class="arrow"/>
  <path d="M 1055 270 L 960 340" class="arrow"/>
  <path d="M 1275 350 L 1275 500" class="arrow"/>

  <path d="M 600 420 L 240 450" class="arrow"/>
  <path d="M 240 530 L 600 530" class="arrow"/>
  <path d="M 600 420 L 600 450" class="arrow"/>
  <path d="M 600 530 L 600 570" class="arrow"/>
  <path d="M 740 605 L 810 535" class="arrow"/>
  <path d="M 960 420 L 960 500" class="arrow"/>
  <path d="M 960 580 L 960 640" class="arrow"/>
  <path d="M 960 720 L 960 790" class="arrow"/>
  <path d="M 1110 680 L 1170 680" class="arrow"/>
</svg>
