<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720">
  <style>
    .title { font: 700 26px Arial, sans-serif; fill: #111827; }
    .label { font: 600 16px Arial, sans-serif; fill: #111827; }
    .small { font: 500 13px Arial, sans-serif; fill: #374151; }
    .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 12; }
    .blue { fill: #eff6ff; stroke: #1d4ed8; }
    .green { fill: #ecfdf5; stroke: #047857; }
    .orange { fill: #fff7ed; stroke: #c2410c; }
    .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
