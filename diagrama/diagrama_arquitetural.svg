  <rect x="760" y="202" width="160" height="56" class="box gray"/>
  <text x="840" y="236" text-anchor="middle" class="label">pipeline</text>

  <rect x="950" y="202" width="160" height="56" class="box gray"/>
  <text x="1030" y="236" text-anchor="middle" class="label">reports</text>

  <rect x="1140" y="202" width="160" height="56" class="box gray"/>
