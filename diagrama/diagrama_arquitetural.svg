<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="980" viewBox="0 0 1480 980">
  <style>
    .title { font: 700 28px Arial, sans-serif; fill: #111827; }
    .section { font: 700 18px Arial, sans-serif; fill: #111827; }
    .label { font: 600 15px Arial, sans-serif; fill: #111827; }
    .small { font: 500 13px Arial, sans-serif; fill: #374151; }
    .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 14; }
    .blue { fill: #eff6ff; stroke: #2563eb; }
    .green { fill: #ecfdf5; stroke: #059669; }
    .orange { fill: #fff7ed; stroke: #ea580c; }
    .purple { fill: #faf5ff; stroke: #7c3aed; }
    .gray { fill: #f3f4f6; stroke: #4b5563; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
    .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
