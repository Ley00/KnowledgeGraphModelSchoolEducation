  <text x="65" y="382" class="section">2. Camada de banco e extração</text>

  <rect x="90" y="430" width="300" height="78" class="box green"/>
  <text x="240" y="462" text-anchor="middle" class="label">school_predictor.database.maintenance</text>
  <text x="240" y="485" text-anchor="middle" class="small">prepara banco restaurado e anonimiza dados</text>

  <rect x="440" y="430" width="300" height="78" class="box green"/>
  <text x="590" y="462" text-anchor="middle" class="label">school_predictor.database.extraction</text>
  <text x="590" y="485" text-anchor="middle" class="small">executa consultas e gera CSVs base</text>

  <rect x="790" y="430" width="250" height="78" class="box"/>
  <text x="915" y="462" text-anchor="middle" class="label">private_runtime.py</text>
  <text x="915" y="485" text-anchor="middle" class="small">execucao local sensivel fora do fluxo publico</text>

  <rect x="1080" y="430" width="290" height="78" class="box"/>
