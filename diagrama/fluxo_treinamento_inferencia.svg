<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1120" viewBox="0 0 1500 1120">
  <style>
    .title { font: 700 28px Arial, sans-serif; fill: #111827; }
    .section { font: 700 18px Arial, sans-serif; fill: #111827; }
    .label { font: 600 15px Arial, sans-serif; fill: #111827; }
    .small { font: 500 13px Arial, sans-serif; fill: #374151; }
    .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 14; }
    .blue { fill: #eff6ff; stroke: #2563eb; }
    .green { fill: #ecfdf5; stroke: #059669; }
    .orange { fill: #fff7ed; stroke: #ea580c; }
    .purple { fill: #faf5ff; stroke: #7c3aed; }
    .gray { fill: #f3f4f6; stroke: #4b5563; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="750" y="42" text-anchor="middle" class="title">Fluxo de Treinamento e Inferência</text>

  <rect x="40" y="70" width="1420" height="610" class="panel"/>
  <text x="65" y="102" class="section">1. Fluxo de treinamento</text>

  <rect x="100" y="150" width="300" height="78" class="box orange"/>
  <text x="250" y="182" text-anchor="middle" class="label">CSV de notas, faltas, pagamentos e professores</text>
  <text x="250" y="205" text-anchor="middle" class="small">dados base extraidos do banco</text>

  <rect x="480" y="150" width="240" height="78" class="box blue"/>
  <text x="600" y="182" text-anchor="middle" class="label">load_source_tables()</text>
  <text x="600" y="205" text-anchor="middle" class="small">le os CSVs e organiza as tabelas fonte</text>

  <rect x="800" y="150" width="320" height="78" class="box purple"/>
  <text x="960" y="182" text-anchor="middle" class="label">build_prediction_dataset()</text>
  <text x="960" y="205" text-anchor="middle" class="small">monta o dataset temporal final de modelagem</text>

  <rect x="1180" y="130" width="220" height="58" class="box gray"/>
  <text x="1290" y="165" text-anchor="middle" class="label">prepare_grades()</text>

  <rect x="1180" y="200" width="220" height="58" class="box gray"/>
  <text x="1290" y="235" text-anchor="middle" class="label">prepare_absences()</text>

  <rect x="1180" y="270" width="220" height="58" class="box gray"/>
  <text x="1290" y="305" text-anchor="middle" class="label">prepare_payments()</text>

  <rect x="1180" y="340" width="220" height="58" class="box gray"/>
  <text x="1290" y="375" text-anchor="middle" class="label">prepare_teachers()</text>

  <rect x="190" y="320" width="260" height="78" class="box"/>
  <text x="320" y="352" text-anchor="middle" class="label">features temporais e contextuais</text>
  <text x="320" y="375" text-anchor="middle" class="small">historico, deltas, faltas e financeiro</text>

  <rect x="520" y="320" width="250" height="78" class="box"/>
  <text x="645" y="352" text-anchor="middle" class="label">criacao dos alvos</text>
  <text x="645" y="375" text-anchor="middle" class="small">target_nota_proxima e target_risco_proxima</text>

  <rect x="840" y="320" width="240" height="78" class="box"/>
  <text x="960" y="352" text-anchor="middle" class="label">filtro por min_history</text>
  <text x="960" y="375" text-anchor="middle" class="small">define elegibilidade minima do aluno</text>

  <rect x="190" y="470" width="240" height="78" class="box blue"/>
  <text x="310" y="502" text-anchor="middle" class="label">select_model_columns()</text>
  <text x="310" y="525" text-anchor="middle" class="small">separa features e categoricas</text>

  <rect x="500" y="470" width="300" height="78" class="box green"/>
  <text x="650" y="502" text-anchor="middle" class="label">train_and_evaluate()</text>
  <text x="650" y="525" text-anchor="middle" class="small">núcleo de treino, seleção, teste e métricas</text>

  <rect x="860" y="440" width="200" height="58" class="box gray"/>
  <text x="960" y="475" text-anchor="middle" class="label">temporal_split()</text>

  <rect x="1080" y="440" width="250" height="58" class="box gray"/>
  <text x="1205" y="475" text-anchor="middle" class="label">escolha do melhor regressor</text>

  <rect x="860" y="520" width="200" height="58" class="box gray"/>
  <text x="960" y="555" text-anchor="middle" class="label">escolha do classificador</text>

  <rect x="1080" y="520" width="250" height="58" class="box gray"/>
  <text x="1205" y="555" text-anchor="middle" class="label">retreino e predição no teste</text>

  <rect x="500" y="590" width="300" height="78" class="box green"/>
  <text x="650" y="622" text-anchor="middle" class="label">métricas, predictions e análise de erro</text>
  <text x="650" y="645" text-anchor="middle" class="small">resultado analítico consolidado da modelagem</text>

  <path d="M 400 189 L 480 189" class="arrow"/>
  <path d="M 720 189 L 800 189" class="arrow"/>
  <path d="M 1120 189 L 1180 159" class="arrow"/>
  <path d="M 1120 189 L 1180 229" class="arrow"/>
  <path d="M 1120 189 L 1180 299" class="arrow"/>
  <path d="M 1120 189 L 1180 369" class="arrow"/>
  <path d="M 960 228 L 320 320" class="arrow"/>
  <path d="M 960 228 L 645 320" class="arrow"/>
  <path d="M 960 228 L 960 320" class="arrow"/>
  <path d="M 320 398 L 310 470" class="arrow"/>
  <path d="M 645 398 L 645 470" class="arrow"/>
  <path d="M 960 398 L 650 470" class="arrow"/>
  <path d="M 430 509 L 500 509" class="arrow"/>
  <path d="M 800 509 L 860 469" class="arrow"/>
  <path d="M 800 509 L 1080 469" class="arrow"/>
  <path d="M 800 509 L 860 549" class="arrow"/>
  <path d="M 800 509 L 1080 549" class="arrow"/>
  <path d="M 650 548 L 650 590" class="arrow"/>

  <rect x="40" y="720" width="1420" height="350" class="panel"/>
  <text x="65" y="752" class="section">2. Fluxo de inferência e uso</text>

  <rect x="170" y="820" width="280" height="78" class="box orange"/>
  <text x="310" y="852" text-anchor="middle" class="label">artifacts/pipeline/previsao_nota</text>
  <text x="310" y="875" text-anchor="middle" class="small">dataset, predictions, modelo e relatorio tecnico</text>

  <rect x="520" y="820" width="280" height="78" class="box orange"/>
  <text x="660" y="852" text-anchor="middle" class="label">artifacts/pipeline/alerta_risco</text>
  <text x="660" y="875" text-anchor="middle" class="small">dataset, predictions, modelo e relatorio tecnico</text>

  <rect x="880" y="820" width="280" height="78" class="box purple"/>
  <text x="1020" y="852" text-anchor="middle" class="label">build_school_reports()</text>
  <text x="1020" y="875" text-anchor="middle" class="small">combina modos e calcula nivel de atenção</text>

  <rect x="1240" y="820" width="180" height="78" class="box blue"/>
  <text x="1330" y="852" text-anchor="middle" class="label">dashboard_streamlit.py</text>
  <text x="1330" y="875" text-anchor="middle" class="small">consome relatórios finais</text>

  <rect x="250" y="950" width="210" height="58" class="box"/>
  <text x="355" y="985" text-anchor="middle" class="label">relatorio_professor</text>

  <rect x="510" y="950" width="220" height="58" class="box"/>
  <text x="620" y="985" text-anchor="middle" class="label">relatorio_coordenacao</text>

  <rect x="790" y="950" width="210" height="58" class="box"/>
  <text x="895" y="985" text-anchor="middle" class="label">relatorio_secretaria</text>

  <rect x="1060" y="950" width="240" height="58" class="box"/>
  <text x="1180" y="985" text-anchor="middle" class="label">ranking_executivo</text>

  <path d="M 650 668 L 650 780" class="arrow"/>
  <path d="M 450 859 L 520 859" class="arrow"/>
  <path d="M 800 859 L 880 859" class="arrow"/>
  <path d="M 1160 859 L 1240 859" class="arrow"/>
  <path d="M 1020 898 L 355 950" class="arrow"/>
  <path d="M 1020 898 L 620 950" class="arrow"/>
  <path d="M 1020 898 L 895 950" class="arrow"/>
  <path d="M 1020 898 L 1180 950" class="arrow"/>
</svg>
